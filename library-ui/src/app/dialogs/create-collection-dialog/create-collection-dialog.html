<form class="collection-form" (ngSubmit)="createCollection()" [formGroup]="collectionForm" *transloco="let t; prefix: 'collections.dialog'">
  <mat-form-field class="collection-input">
    <mat-label>{{ t('name') }}</mat-label>
    <input matInput formControlName="name">
  </mat-form-field>

  <mat-form-field class="collection-input">
    <mat-label>{{ t('description') }}</mat-label>
    <textarea matInput formControlName="description"></textarea>
  </mat-form-field>

  <div class="color-picker">
    <label>{{ t('color') }}</label>
    <div class="color-options">
      @for (color of colors; track color) {
        <button
          type="button"
          mat-icon-button
          [ngStyle]="{'background-color': color}"
          [class.selected]="color === selectedColor"
          (click)="selectColor(color)">
        </button>
      }
    </div>
  </div>

  <div class="buttons" *transloco="let c; prefix: 'common'">
    <button type="submit" mat-flat-button (click)="createCollection()" [disabled]="collectionForm.invalid">
      {{ t('create') }}
    </button>
    <button mat-stroked-button mat-dialog-close>{{ c('cancel') }}</button>
  </div>
</form>

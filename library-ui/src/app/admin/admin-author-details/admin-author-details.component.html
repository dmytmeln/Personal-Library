<div class="admin-details-container" *transloco="let t; prefix: 'admin.authorDetails'">
  <div class="header-row">
    <h1 class="page-title">{{ authorId ? t('editTitle') : t('newTitle') }}</h1>
    <div class="actions">
      <button mat-button (click)="cancel()">{{ t('cancel') }}</button>
      @if (authorId) {
        <button mat-button color="warn" (click)="delete()">{{ t('delete') }}</button>
      }
      <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="save()">{{ t('save') }}</button>
    </div>
  </div>

  @if (loading()) {
    <div class="loader-container">
      <mat-spinner diameter="50"></mat-spinner>
    </div>
  } @else {
    <form [formGroup]="form" class="details-form">
      <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="start" animationDuration="0ms">
        <mat-tab [label]="t('tabs.general')">
          <div class="tab-content">
            <div class="row">
              <mat-form-field appearance="outline">
                <mat-label>{{ t('fields.birthYear') }}</mat-label>
                <input matInput type="number" formControlName="birthYear">
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>{{ t('fields.deathYear') }}</mat-label>
                <input matInput type="number" formControlName="deathYear">
              </mat-form-field>
            </div>
          </div>
        </mat-tab>

        <mat-tab [label]="t('tabs.translations')">
          <div class="tab-content">
            <mat-tab-group formGroupName="translations" mat-stretch-tabs="false" mat-align-tabs="start" animationDuration="0ms">
              @for (lang of languages; track lang) {
                <mat-tab [label]="lang.toUpperCase()" [formGroupName]="lang">
                  <div class="translation-fields">
                    <mat-form-field appearance="outline">
                      <mat-label>{{ t('fields.fullName') }}</mat-label>
                      <input matInput formControlName="fullName">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                      <mat-label>{{ t('fields.country') }}</mat-label>
                      <input matInput formControlName="country">
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                      <mat-label>{{ t('fields.bio') }}</mat-label>
                      <textarea matInput formControlName="biography" rows="8"></textarea>
                    </mat-form-field>
                  </div>
                </mat-tab>
              }
            </mat-tab-group>
          </div>
        </mat-tab>
      </mat-tab-group>
    </form>
  }
</div>

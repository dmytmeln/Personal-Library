<div class="search-container">
  <div class="header-row">
    <h1 class="page-title">Пошук книг</h1>
    <div class="header-actions">
      <mat-button-toggle-group [value]="viewMode()" (change)="viewMode.set($event.value)" aria-label="View Mode">
        <mat-button-toggle value="grid">
          <mat-icon>grid_view</mat-icon>
        </mat-button-toggle>
        <mat-button-toggle value="list">
          <mat-icon>view_list</mat-icon>
        </mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  </div>

  <mat-tab-group [selectedIndex]="uiState.activeTabIndex" (selectedIndexChange)="onTabChange($event)"
                 mat-stretch-tabs="false" mat-align-tabs="start" animationDuration="0ms">
    <mat-tab label="Всі книги">
      <div class="tab-content">
        <app-filter-shell [hasActiveFilters]="hasActiveFilters()" (resetAll)="clearAllFilters()">
          <div mainFilters>
            <app-text-filter
              label="Назва книги"
              [value]="filters.state().title || ''"
              (valueChange)="filters.update('title', $event)"/>

            <app-autocomplete-filter
              label="Автор"
              [searchInput]="authorSearch.query()"
              [selected]="filters.state().author"
              [options]="authorSearch.results()"
              displayField="fullName"
              (searchInputChange)="onAuthorSearchInput($event)"
              (optionSelected)="onAuthorSelected($event)"
              (clear)="clearAuthorFilter()"/>

            <app-autocomplete-filter
              label="Категорія"
              [searchInput]="categorySearch.query()"
              [selected]="filters.state().category"
              [options]="categorySearch.results()"
              displayField="name"
              (searchInputChange)="onCategorySearchInput($event)"
              (optionSelected)="onCategorySelected($event)"
              (clear)="clearCategoryFilter()"/>
          </div>

          <div secondaryFilters>
            <app-range-filter
              label="Рік видання"
              [range]="filters.state().publishYear"
              (rangeChange)="filters.update('publishYear', $event)"/>

            <app-range-filter
              label="Кількість сторінок"
              [range]="filters.state().pages"
              (rangeChange)="filters.update('pages', $event)"/>
          </div>

          <div footerFilters>
            <app-language-filter
              [available]="languages()"
              [selected]="filters.state().languages"
              [showAll]="showAllLanguages()"
              (toggle)="toggleLanguage($event)"
              (toggleShowAll)="showAllLanguages.set(!showAllLanguages())"
              (clear)="filters.update('languages', [])"/>
          </div>
        </app-filter-shell>

        <app-sort-bar [options]="DEFAULT_SORT_OPTIONS" (sortChange)="onBooksSortChange($event)"/>

        <app-books-display
          [books]="booksState.items"
          [totalElements]="booksState.pagination.totalElements"
          [pageSize]="booksState.pagination.pageSize"
          [pageIndex]="booksState.pagination.currentPage"
          [loading]="booksState.loading"
          [actionsMenu]="searchBookMenu"
          [selectionStore]="selection"
          [viewMode]="viewMode()"
          (pageChange)="onBooksPageChange($event)"/>
      </div>
    </mat-tab>

    <mat-tab label="Автори">
      <app-author-list mode="search" (authorBooks)="showAuthorBooks($event)"/>
    </mat-tab>

    <mat-tab label="Жанри">
      <app-category-list mode="search" (categoryBooks)="goToCategoryBooks($event)"/>
    </mat-tab>
  </mat-tab-group>
</div>

<app-bulk-action-bar [selectedCount]="selection.count()" (clear)="selection.clear()">
  <button mat-flat-button (click)="bulkAddBooks()">
    <mat-icon>add_circle</mat-icon>
    <span>Додати до бібліотеки</span>
  </button>
</app-bulk-action-bar>

<mat-menu #searchBookMenu="matMenu">
  <ng-template matMenuContent let-book>
    <button mat-menu-item (click)="goToBookDetails(book)">
      <mat-icon>info</mat-icon>
      <span>Деталі книги</span>
    </button>
    <button mat-menu-item (click)="addBookToLibrary(book)" [disabled]="isBookInLibrary(book)">
      <mat-icon>add_circle</mat-icon>
      <span>{{ isBookInLibrary(book) ? 'Вже у бібліотеці' : 'Додати до бібліотеки' }}</span>
    </button>
  </ng-template>
</mat-menu>

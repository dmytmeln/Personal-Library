<div class="selector-container">
  <div class="tree-actions">
    <button mat-button (click)="tree.expandAll()" matTooltip="Розгорнути всі гілки" [matTooltipShowDelay]="SHOW_DELAY">
      <mat-icon>unfold_more</mat-icon>
      <span>Розгорнути всі</span>
    </button>
    <button mat-button (click)="tree.collapseAll()" matTooltip="Згорнути всі гілки" [matTooltipShowDelay]="SHOW_DELAY">
      <mat-icon>unfold_less</mat-icon>
      <span>Згорнути всі</span>
    </button>
  </div>

  @if (showRoot()) {
    <div class="root-selection"
         (click)="select(null, 'Root')"
         [class.active]="selectedId === null"
         matTooltip="Вибрати корінь (без батьківської колекції)"
         [matTooltipShowDelay]="SHOW_DELAY">
      <mat-icon>home</mat-icon>
      <span>Root (No Parent)</span>
    </div>
  }

  <div class="tree-wrapper">
    <mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor">
      <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
        <div class="node-container">
          <button mat-icon-button disabled></button>
          <div class="selection-area"
               [class.active]="selectedId === node.id"
               [class.disabled]="isDisabled(node.id)"
               (click)="select(node.id, node.name)"
               [matTooltip]="isDisabled(node.id) ? 'Книга вже в цій колекції' : 'Вибрати колекцію'"
               [matTooltipShowDelay]="SHOW_DELAY">
            <mat-icon>folder</mat-icon>
            <span>{{ node.name }}</span>
          </div>
        </div>
      </mat-tree-node>

      <mat-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding
                     [cdkTreeNodeTypeaheadLabel]="node.name">
        <div class="node-container">
          <button mat-icon-button matTreeNodeToggle
                  [attr.aria-label]="'Toggle ' + node.name"
                  [matTooltip]="tree.isExpanded(node) ? 'Згорнути' : 'Розгорнути'"
                  [matTooltipShowDelay]="SHOW_DELAY">
            <mat-icon class="mat-icon-rtl-mirror">
              {{ tree.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
            </mat-icon>
          </button>
          <div class="selection-area"
               [class.active]="selectedId === node.id"
               [class.disabled]="isDisabled(node.id)"
               (click)="select(node.id, node.name)"
               [matTooltip]="isDisabled(node.id) ? 'Книга вже в цій колекції' : 'Вибрати колекцію'"
               [matTooltipShowDelay]="SHOW_DELAY">
            <mat-icon>{{ tree.isExpanded(node) ? 'folder_open' : 'folder' }}</mat-icon>
            <span>{{ node.name }}</span>
          </div>
        </div>
      </mat-tree-node>
    </mat-tree>
  </div>
</div>

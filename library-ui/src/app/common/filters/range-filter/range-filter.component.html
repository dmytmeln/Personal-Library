<div class="range-filter-container" *transloco="let t; prefix: 'common'">
  <span class="range-label">{{ label() }}</span>
  <div class="range-inputs">
    <mat-form-field appearance="outline" class="range-input" subscriptSizing="dynamic">
      <mat-label>{{ minPlaceholder() }}</mat-label>
      <input
        matInput
        type="number"
        [ngModel]="range().min"
        (ngModelChange)="onMinChange($event)">
    </mat-form-field>
    
    <mat-form-field appearance="outline" class="range-input" subscriptSizing="dynamic">
      <mat-label>{{ maxPlaceholder() }}</mat-label>
      <input
        matInput
        type="number"
        [ngModel]="range().max"
        (ngModelChange)="onMaxChange($event)">
    </mat-form-field>

    <button mat-icon-button
            (click)="clear()"
            [style.visibility]="hasValue() ? 'visible' : 'hidden'"
            [matTooltip]="t('clear')">
      <mat-icon>close</mat-icon>
    </button>
  </div>
</div>

<mat-form-field appearance="outline" class="filter-field" subscriptSizing="dynamic">
  <mat-label>{{ label() }}</mat-label>
  <input
    matInput
    [formControl]="inputControl"
    (input)="onInputChange(inputControl.value)"
    (focus)="onInputChange(inputControl.value)"
    [matAutocomplete]="auto"
    [placeholder]="placeholder()">

  @if (selected() || searchInput()) {
    <button mat-icon-button matSuffix (click)="onClear()">
      <mat-icon>close</mat-icon>
    </button>
  }

  <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn" (optionSelected)="onSelect($event.option.value)">
    @for (option of options(); track option.id) {
      <mat-option [value]="option">{{ option[displayField()] }}</mat-option>
    }
  </mat-autocomplete>
</mat-form-field>

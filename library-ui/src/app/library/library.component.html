<div *transloco="let t; prefix: 'library'">
  <div class="header-row">
    <h1 class="page-title">{{ t('title') }}</h1>
    <div class="header-actions">
      <mat-button-toggle-group [value]="viewMode()" (change)="viewMode.set($event.value)">
        <mat-button-toggle value="grid">
          <mat-icon>grid_view</mat-icon>
        </mat-button-toggle>
        <mat-button-toggle value="list">
          <mat-icon>view_list</mat-icon>
        </mat-button-toggle>
      </mat-button-toggle-group>
      <button mat-flat-button color="primary" (click)="openViewBookListDialog()">
        <mat-icon>add</mat-icon>
        {{ t('menu.addToLibrary') }}
      </button>
    </div>
  </div>

  <mat-tab-group [selectedIndex]="uiState.activeTabIndex" (selectedIndexChange)="onTabChange($event)"
                 mat-stretch-tabs="false" mat-align-tabs="start" animationDuration="0ms">

    <mat-tab [label]="t('tabs.allBooks')">
      <div class="tab-content">

        <app-filter-shell [hasActiveFilters]="hasActiveFilters()"
                          [(isExpanded)]="isFiltersExpanded"
                          [activeFiltersCount]="activeFiltersCount()"
                          (resetAll)="clearAllFilters()">
          <div topRowFilters *transloco="let f; prefix: 'library.filters'">
            <app-text-filter
              [label]="f('bookTitle')"
              [value]="filters.state().title"
              (valueChange)="filters.update('title', $event)"/>
          </div>

          <div mainFilters *transloco="let f; prefix: 'library.filters'">
            <app-select-filter
              [label]="f('status')"
              [value]="filters.state().status"
              [options]="statusOptions()"
              (valueChange)="filters.update('status', $event)"
              (clear)="filters.update('status', null)"
            />

            <app-autocomplete-filter
              [label]="f('author')"
              [searchInput]="authorSearch.query()"
              [selected]="filters.state().author"
              [options]="authorSearch.results()"
              displayField="fullName"
              (searchInputChange)="onAuthorSearchInput($event)"
              (optionSelected)="onAuthorSelected($event)"
              (clear)="clearAuthorFilter()"/>

            <app-autocomplete-filter
              [label]="f('category')"
              [searchInput]="categorySearch.query()"
              [selected]="filters.state().category"
              [options]="categorySearch.results()"
              displayField="name"
              (searchInputChange)="onCategorySearchInput($event)"
              (optionSelected)="onCategorySelected($event)"
              (clear)="clearCategoryFilter()"/>
          </div>

          <div secondaryFilters *transloco="let f; prefix: 'library.filters'">
            <ng-container *transloco="let c; prefix: 'common'">
              <app-range-filter
                [label]="f('publishYear')"
                [range]="filters.state().publishYear"
                (rangeChange)="filters.update('publishYear', $event)"/>

              <app-range-filter
                [label]="f('pages')"
                [range]="filters.state().pages"
                (rangeChange)="filters.update('pages', $event)"/>

              <app-range-filter
                [label]="f('rating')"
                [range]="filters.state().rating"
                (rangeChange)="filters.update('rating', $event)"/>
            </ng-container>
          </div>

          <div footerFilters>
            <app-language-filter
              [available]="languages()"
              [selected]="filters.state().languages"
              [showAll]="showAllLanguages()"
              (toggle)="toggleLanguage($event)"
              (toggleShowAll)="showAllLanguages.set(!showAllLanguages())"
              (clear)="filters.update('languages', [])"/>
          </div>
        </app-filter-shell>

        <app-sort-bar [options]="bookSortOptions()" (sortChange)="onSortChange($event)"/>

        <app-books-display
          [books]="booksState.items"
          [totalElements]="booksState.totalElements"
          [pageSize]="booksState.pageSize"
          [pageIndex]="booksState.currentPage"
          [loading]="booksState.loading"
          [actionsMenu]="libraryBookMenu"
          [selectionStore]="selection"
          [viewMode]="viewMode()"
          (pageChange)="onPageChange($event)"/>
      </div>
    </mat-tab>

    <mat-tab [label]="t('tabs.authors')">
      @if (uiState.authorsOpened) {
        <app-author-list mode="library" (authorBooks)="goToAuthorBooks($event)"/>
      }
    </mat-tab>

    <mat-tab [label]="t('tabs.categories')">
      @if (uiState.categoriesOpened) {
        <app-category-list mode="library" (categoryBooks)="goToCategoryBooks($event)"/>
      }
    </mat-tab>

  </mat-tab-group>
</div>

<app-bulk-action-bar [selectedCount]="selection.count()" (clear)="selection.clear()">
  <ng-container *transloco="let b; prefix: 'library.bulkActions'">
    <button mat-flat-button [matMenuTriggerFor]="bulkStatusMenu">
      <mat-icon>label</mat-icon>
      <span>{{ b('changeStatus') }}</span>
    </button>
    <button mat-flat-button (click)="openBulkAddToCollectionDialog()">
      <mat-icon>playlist_add</mat-icon>
      <span>{{ b('addToCollection') }}</span>
    </button>
    <button mat-flat-button color="warn" (click)="bulkRemoveFromLibrary()">
      <mat-icon>delete</mat-icon>
      <span>{{ b('removeFromLibrary') }}</span>
    </button>
  </ng-container>
</app-bulk-action-bar>

<mat-menu #bulkStatusMenu="matMenu">
  @for (option of statusOptions(); track option.value) {
    <button mat-menu-item (click)="bulkUpdateStatus(option.value)">
      <span>{{ option.label }}</span>
    </button>
  }
</mat-menu>

<mat-menu #libraryBookMenu="matMenu">
  <ng-template matMenuContent let-libraryBook="libraryBook">
    <ng-container *transloco="let m; prefix: 'library.menu'">
      <button mat-menu-item (click)="openNoteDialog(libraryBook)">
        <mat-icon>note_alt</mat-icon>
        <span>{{ m('myNotes') }}</span>
      </button>
      <button mat-menu-item (click)="openEditDetailsDialog(libraryBook)">
        <mat-icon>edit</mat-icon>
        <span>{{ m('editDetails') }}</span>
      </button>
      <button mat-menu-item (click)="addToCollection(libraryBook)">
        <mat-icon>playlist_add</mat-icon>
        <span>{{ m('addToCollection') }}</span>
      </button>
      <button mat-menu-item [matMenuTriggerFor]="sharedMenu.statusMenu"
              [matMenuTriggerData]="{ libraryBook: libraryBook }">
        <mat-icon>label</mat-icon>
        <span>{{ m('changeStatus') }}</span>
      </button>
      <button mat-menu-item [matMenuTriggerFor]="sharedMenu.ratingMenu"
              [matMenuTriggerData]="{ libraryBook: libraryBook }">
        <mat-icon>star</mat-icon>
        <span>{{ m('rate') }}</span>
      </button>
      <button mat-menu-item (click)="removeFromAllCollections(libraryBook)">
        <mat-icon>folder_delete</mat-icon>
        <span>{{ m('removeFromAllCollections') }}</span>
      </button>
      <button mat-menu-item (click)="deleteLibraryBook(libraryBook)">
        <mat-icon color="warn">delete</mat-icon>
        <span>{{ m('removeFromLibrary') }}</span>
      </button>
    </ng-container>
  </ng-template>
</mat-menu>

<app-library-book-menu-items #sharedMenu
                             (statusChange)="changeLibraryBookStatus($event)"
                             (ratingChange)="changeLibraryBookRating($event)"
                             style="display: none;">
</app-library-book-menu-items>

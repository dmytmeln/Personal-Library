databaseChangeLog:
  - changeSet:
      id: create_table_tf_idf_vocabulary
      author: Dmytro Melnyk
      changes:
        - createTable:
            tableName: tf_idf_vocabulary
            columns:
              - column:
                  name: word
                  type: VARCHAR(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vector_index
                  type: INTEGER
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: idf_score
                  type: DOUBLE PRECISION
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INTEGER
                  constraints:
                    nullable: false

  - changeSet:
      id: create_table_genre_mapping
      author: Dmytro Melnyk
      changes:
        - createTable:
            tableName: genre_mapping
            columns:
              - column:
                  name: category_id
                  type: INTEGER
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: genre_mapping_categories_fk
                    referencedTableName: categories
                    referencedColumnNames: category_id
              - column:
                  name: vector_index
                  type: INTEGER
                  constraints:
                    nullable: false
                    unique: true

databaseChangeLog:
  - changeSet:
      id: create_table_authors
      author: Dmytro Melnyk
      changes:
        - createSequence:
            sequenceName: authors_seq
            startValue: 20
            incrementBy: 20
        - createTable:
            tableName: authors
            columns:
              - column:
                  name: author_id
                  type: integer
                  constraints:
                    primaryKey: true
                    primaryKeyName: authors_pk
              - column:
                  name: birth_year
                  type: smallint
                  constraints:
                    nullable: false
              - column:
                  name: death_year
                  type: smallint
                  constraints:
                    nullable: true
              - column:
                  name: popularity_count
                  type: integer
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

  - changeSet:
      id: create_table_author_translations
      author: Dmytro Melnyk
      changes:
        - createTable:
            tableName: author_translations
            columns:
              - column:
                  name: author_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: author_translations_authors_fk
                    referencedTableName: authors
                    referencedColumnNames: author_id
                    deleteCascade: true
              - column:
                  name: language_code
                  type: varchar(2)
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: biography
                  type: text
                  constraints:
                    nullable: true
        - addPrimaryKey:
            tableName: author_translations
            columnNames: author_id, language_code
            constraintName: author_translations_pk

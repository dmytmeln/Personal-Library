databaseChangeLog:
  - changeSet:
      id: create_table_vocabulary_metadata
      author: Dmytro Melnyk
      changes:
        - createTable:
            tableName: vocabulary_metadata
            columns:
              - column:
                  name: id
                  type: integer
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: current_version
                  type: integer
                  defaultValue: 1
                  constraints:
                    nullable: false
              - column:
                  name: last_rebuild_at
                  type: timestamp
                  constraints:
                    nullable: true
        - insert:
            tableName: vocabulary_metadata
            columns:
              - column:
                  name: id
                  value: 1
              - column:
                  name: current_version
                  value: 1

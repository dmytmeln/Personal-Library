databaseChangeLog:
  - changeSet:
      id: create_table_collections
      author: Dmytro Melnyk
      changes:
        - createSequence:
            sequenceName: collections_seq
            startValue: 1
            incrementBy: 20
        - createTable:
            tableName: collections
            columns:
              - column:
                  name: collection_id
                  type: integer
                  constraints:
                    primaryKey: true
                    primaryKeyName: collections_pk
              - column:
                  name: user_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: collections_users_fk
                    referencedTableName: users
                    referencedColumnNames: user_id
              - column:
                  name: parent_id
                  type: integer
                  constraints:
                    nullable: true
                    foreignKeyName: collections_parent_fk
                    referencedTableName: collections
                    referencedColumnNames: collection_id
                    onDelete: CASCADE
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: collections_name_uq
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
        - createIndex:
            indexName: collections_parent_idx
            tableName: collections
            columns:
              - column:
                  name: parent_id
